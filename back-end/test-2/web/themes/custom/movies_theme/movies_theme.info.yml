name: 'Movies'
type: theme
description: 'Olivero subtheme for the movie site. Moves the sidebar to the left of the content, so the "most popular" and "top rated" lists sit in a left sidebar.'
package: Custom
core_version_requirement: ^10 || ^11
base theme: olivero
libraries:
  - movies_theme/sidebar-left
regions:
  header: Header
  primary_menu: Primary menu
  secondary_menu: Secondary menu
  hero: 'Hero (full width)'
  highlighted: Highlighted
  breadcrumb: Breadcrumb
  social: 'Social Bar'
  content_above: 'Content Above'
  content: Content
  sidebar: Sidebar
  content_below: 'Content Below'
  footer_top: 'Footer Top'
  footer_bottom: 'Footer Bottom'
